<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日報記録アプリのご案内｜カーゴレポート</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px;
    }
    .heading {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
      padding-bottom: 14px;
      border-bottom: 2px solid #0071BC;
      color: #0071BC;
    }
    .body-text {
      font-size: 15px;
      margin-bottom: 24px;
      color: #333;
    }
    .info-block {
      background: #F4F7FC;
      border-left: 4px solid #0071BC;
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .info-block ul {
      list-style: none;
      font-size: 15px;
      color: #1a1a1a;
    }
    .info-block ul li {
      padding: 5px 0;
    }
    .info-block ul li.indent {
      padding-left: 1.5em;
      font-size: 14px;
      color: #444;
    }
    .info-block ul li.note {
      padding-left: 1.5em;
      font-size: 13px;
      color: #666;
    }
    .closing {
      font-size: 15px;
      color: #333;
    }
    .template-box {
      border: 1.5px solid #ccd6e0;
      border-radius: 8px;
      padding: 24px 28px;
    }
    .template-box .heading {
      margin-bottom: 16px;
    }
    .template-box .body-text {
      margin-bottom: 16px;
    }
    @media print {
      body { font-size: 13px; }
      .page { margin: 20px auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="body-text">ご案内時のお手間を省けるよう、ひな形をご用意いたしました。よろしければご活用ください。</p>
    <div class="template-box">
      <p class="heading">日報記録アプリのご案内</p>
      <p class="body-text">日報の記録漏れ対策としてご活用いただけるアプリです。</p>
      <div class="info-block">
        <ul>
          <li>・アプリ名：カーゴレポート</li>
          <li>・料金：月額380円</li>
          <li>・現在、初回登録限定で6ヶ月間無料</li>
          <li class="note">※登録期限：2026年5月31日まで</li>
          <li class="note">※ダウンロード：App Store または Google Play にて「カーゴレポート」と検索</li>
        </ul>
      </div>
      <p class="closing">ご利用は任意となりますので、ご興味のある方は各自ご確認ください。</p>
    </div>
  </div>
</body>
</html>
