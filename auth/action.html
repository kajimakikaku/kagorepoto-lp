<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カーゴレポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 22px; font-weight: bold; color: #0071BC; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #1a1a1a; }
    p { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 24px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #0071BC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      background: #0071BC;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 8px;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .input-wrap { text-align: left; margin-bottom: 16px; }
    .input-wrap label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #1a1a1a; }
    .input-wrap input {
      width: 100%; padding: 12px; font-size: 15px;
      border: 1px solid #ccc; border-radius: 8px; outline: none;
    }
    .input-wrap input:focus { border-color: #0071BC; }
    .err-msg { color: #d32f2f; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">カーゴレポート</div>
    <div class="subtitle">軽貨物ドライバーの日報記録</div>
    <div id="content">
      <div class="spinner"></div>
      <p>処理中...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import {
      getAuth,
      applyActionCode,
      confirmPasswordReset
    } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

    const showSuccess = (title, message) => {
      document.getElementById('content').innerHTML = `
        <h1>${title}</h1>
        <p>${message}</p>
        <a class="btn" href="kagorepoto://">アプリに戻る</a>
      `;
    };

    const showError = (message) => {
      document.getElementById('content').innerHTML = `
        <h1>エラーが発生しました</h1>
        <p>${message}</p>
        <a class="btn" href="kagorepoto://">アプリに戻る</a>
      `;
    };

    const showPasswordForm = (auth, oobCode) => {
      document.getElementById('content').innerHTML = `
        <h1>新しいパスワードを設定</h1>
        <div class="input-wrap">
          <label>新しいパスワード</label>
          <input type="password" id="pw1" placeholder="8文字以上">
        </div>
        <div class="input-wrap">
          <label>新しいパスワード（確認）</label>
          <input type="password" id="pw2" placeholder="もう一度入力">
        </div>
        <div class="err-msg" id="pw-err"></div>
        <button class="btn" id="submit-btn">パスワードを変更する</button>
      `;

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const pw1 = document.getElementById('pw1').value;
        const pw2 = document.getElementById('pw2').value;
        const errEl = document.getElementById('pw-err');
        const btn = document.getElementById('submit-btn');

        if (pw1.length < 8) {
          errEl.textContent = 'パスワードは8文字以上で入力してください';
          return;
        }
        if (pw1 !== pw2) {
          errEl.textContent = 'パスワードが一致しません';
          return;
        }

        btn.disabled = true;
        btn.textContent = '変更中...';
        errEl.textContent = '';

        try {
          await confirmPasswordReset(auth, oobCode, pw1);
          showSuccess('パスワードの変更が完了しました', 'アプリに戻って新しいパスワードでログインしてください。');
        } catch (e) {
          btn.disabled = false;
          btn.textContent = 'パスワードを変更する';
          errEl.textContent = 'エラーが発生しました。リンクが無効または期限切れの可能性があります。';
        }
      });
    };

    (async () => {
      try {
        const firebaseConfig = {
          apiKey: "AIzaSyA9ZrEeu8xoA_Ps1sruB9NJD89EVJCGUk0",
          authDomain: "cargo-report.com",
          projectId: "kagorepoto-app-97f74",
          storageBucket: "kagorepoto-app-97f74.firebasestorage.app",
          messagingSenderId: "838608449142",
          appId: "1:838608449142:web:b2bcf73467fe85407cf957"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const oobCode = params.get('oobCode');

        if (!oobCode) {
          showError('無効なリンクです。再度メールをご確認ください。');
        } else if (mode === 'verifyEmail') {
          // ボタン押下後に実行（メールスキャナによる自動消費を防ぐ）
          document.getElementById('content').innerHTML = `
            <h1>メールアドレスの確認</h1>
            <p>下のボタンをタップしてメールアドレスを確認してください。</p>
            <button class="btn" id="verify-btn">メールアドレスを確認する</button>
          `;
          document.getElementById('verify-btn').addEventListener('click', async () => {
            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = '確認中...';
            try {
              await applyActionCode(auth, oobCode);
              showSuccess('メールアドレスの確認が完了しました', 'アプリに戻ってログインしてください。');
            } catch (e) {
              showError('エラーコード: ' + (e.code || e.message || JSON.stringify(e)));
            }
          });
        } else if (mode === 'verifyAndChangeEmail') {
          // ボタン押下後に実行（メールスキャナによる自動消費を防ぐ）
          document.getElementById('content').innerHTML = `
            <h1>メールアドレスの変更確認</h1>
            <p>下のボタンをタップしてメールアドレスの変更を確定してください。</p>
            <button class="btn" id="verify-btn">メールアドレスの変更を確定する</button>
          `;
          document.getElementById('verify-btn').addEventListener('click', async () => {
            const btn = document.getElementById('verify-btn');
            btn.disabled = true;
            btn.textContent = '確認中...';
            try {
              await applyActionCode(auth, oobCode);
              showSuccess('メールアドレスの変更が完了しました', '新しいメールアドレスでログインしてください。');
            } catch (e) {
              showError('このリンクは無効か、すでに使用済みです。<br>再度アプリから操作してください。');
            }
          });
        } else if (mode === 'resetPassword') {
          showPasswordForm(auth, oobCode);
        } else {
          showError('不明な操作です。');
        }
      } catch (e) {
        showError('このリンクは無効か、すでに使用済みです。<br>再度アプリから操作してください。');
        console.error(e);
      }
    })();
  </script>
</body>
</html>
