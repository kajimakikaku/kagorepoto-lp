<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カーゴレポート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 22px; font-weight: bold; color: #0071BC; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #1a1a1a; }
    p { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 32px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #0071BC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #1a1a1a; }
    .btn {
      display: inline-block;
      background: #0071BC;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">カーゴレポート</div>
    <div class="subtitle">軽貨物ドライバーの日報記録</div>
    <div id="content">
      <div class="spinner"></div>
      <p>処理中...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth,
      applyActionCode
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // show/showError は try-catch の外で定義（スコープエラー防止）
    const show = (icon, title, message) => {
      document.getElementById('content').innerHTML = `
        <div class="icon">${icon}</div>
        <h1>${title}</h1>
        <p>${message}</p>
      `;
    };

    const showError = (message) => {
      document.getElementById('content').innerHTML = `
        <h1 class="error">エラーが発生しました</h1>
        <p class="error">${message}</p>
        <a class="btn" href="kagorepoto://">アプリに戻る</a>
      `;
    };

    (async () => {
      try {
        const configRes = await fetch('https://kagorepoto-app-97f74.firebaseapp.com/__/firebase/init.json');
        if (!configRes.ok) throw new Error('設定の取得に失敗しました');
        const firebaseConfig = await configRes.json();
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const oobCode = params.get('oobCode');

        if (!oobCode) {
          showError('無効なリンクです。再度メールをご確認ください。');
        } else if (mode === 'verifyEmail') {
          await applyActionCode(auth, oobCode);
          show('&#9989;', 'メールアドレスの確認が完了しました', 'アプリに戻ってログインしてください。');
        } else if (mode === 'verifyAndChangeEmail') {
          await applyActionCode(auth, oobCode);
          show('&#9989;', 'メールアドレスの変更が完了しました', '新しいメールアドレスでログインしてください。');
        } else if (mode === 'resetPassword') {
          show('&#128273;', 'パスワードのリセット', 'アプリを開いてパスワードをリセットしてください。');
        } else {
          showError('不明な操作です。');
        }
      } catch (e) {
        showError('このリンクは無効か、すでに使用済みです。<br>再度アプリから操作してください。<br><small style="color:#999;font-size:11px;">' + (e.code || e.message || e) + '</small>');
        console.error(e);
      }
    })();
  </script>
</body>
</html>
